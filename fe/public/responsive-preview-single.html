<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEHUB — Responsive Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1220;
        --panel: #111827;
        --border: #1f2937;
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #60a5fa;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: end;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        min-width: 10rem;
      }
      label { font-size: 0.75rem; color: var(--muted); }
      input, select, button { font: inherit; }
      input, select {
        padding: 0.55rem 0.7rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #0f172a;
        color: var(--text);
      }
      button {
        padding: 0.55rem 0.85rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #0f172a;
        color: var(--text);
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #0f172a;
        font-weight: 600;
      }
      .devices {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        width: 100%;
      }
      .device-link {
        padding: 0.4rem 0.7rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #0f172a;
        color: var(--text);
        text-decoration: none;
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
      }
      .device-link.active {
        background: rgba(96, 165, 250, 0.18);
        border-color: var(--accent);
        color: #93c5fd;
      }
      .stage {
        display: flex;
        justify-content: center;
        padding: 1.5rem 1rem 2rem;
      }
      .device {
        width: min(100%, calc(var(--device-width) + 2rem));
        border: 1px solid var(--border);
        border-radius: 24px;
        overflow: hidden;
        background: #020617;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
      }
      .device-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.8125rem;
      }
      .device-screen { padding: 0.75rem; background: #000; }
      .frame {
        width: var(--device-width);
        max-width: 100%;
        margin: 0 auto;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid #334155;
        background: #fff;
      }
      iframe {
        display: block;
        width: 100%;
        height: var(--device-height);
        border: 0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div class="field" style="flex: 1">
        <label for="path">Đường dẫn</label>
        <input id="path" type="text" value="/community" />
      </div>
      <div class="field">
        <label for="preset">Trang mẫu</label>
        <select id="preset">
          <optgroup label="Guest">
            <option value="/">Landing</option>
            <option value="/login">Login</option>
            <option value="/support">Support</option>
          </optgroup>
          <optgroup label="Community">
            <option value="/community" selected>Feed</option>
          </optgroup>
          <optgroup label="Home">
            <option value="/home">Home</option>
            <option value="/home/search">Search</option>
            <option value="/home/documents">Documents</option>
            <option value="/home/messages">Messages</option>
            <option value="/home/final-exam">Final exam</option>
            <option value="/home/my-learning">My learning</option>
            <option value="/home/advisor">Advisor</option>
          </optgroup>
          <optgroup label="Staff">
            <option value="/moderator/violations">Violations</option>
            <option value="/moderator/final-exams/new">Exam wizard</option>
            <option value="/admin/feedback">Admin feedback</option>
          </optgroup>
        </select>
      </div>
      <button class="primary" id="reload">Tải lại</button>
      <a href="responsive-preview-regression.html" style="padding:0.55rem 0.85rem;font:inherit;font-size:0.875rem;font-weight:600;color:var(--text);text-decoration:none;background:#0f172a;border:1px solid var(--border);border-radius:8px;">Regression</a>
      <div class="devices" id="devices"></div>
    </div>
    <div class="stage">
      <div class="device" id="deviceShell">
        <div class="device-top">
          <strong id="deviceName">Tablet</strong>
          <span id="deviceSize">768 × 1024</span>
        </div>
        <div class="device-screen">
          <div class="frame" id="frame">
            <iframe id="preview" title="Responsive preview" src="/community"></iframe>
          </div>
        </div>
      </div>
    </div>
    <script>
      const DEVICES = [
        { id: "desktop", name: "Desktop XL", width: 1440, height: 900 },
        { id: "laptop", name: "Laptop / Shell", width: 1024, height: 768 },
        { id: "tablet", name: "Tablet", width: 768, height: 1024 },
        { id: "phone", name: "Phone", width: 640, height: 900 },
        { id: "phone-sm", name: "Phone SM", width: 480, height: 844 },
        { id: "iphone-se", name: "iPhone SE", width: 375, height: 667 },
      ];
      const params = new URLSearchParams(window.location.search);
      const pathInput = document.getElementById("path");
      const presetSelect = document.getElementById("preset");
      const preview = document.getElementById("preview");
      const devicesEl = document.getElementById("devices");
      const deviceShell = document.getElementById("deviceShell");
      const frame = document.getElementById("frame");
      const origin = window.location.origin;
      pathInput.value = params.get("path") || "/community";
      presetSelect.value = pathInput.value;
      function normalizePath(v) {
        const t = (v || "/").trim();
        return t.startsWith("/") ? t : `/${t}`;
      }
      function buildUrl() {
        return `${origin}${normalizePath(pathInput.value)}`;
      }
      function getDevice(id) {
        return DEVICES.find((d) => d.id === id) || DEVICES[2];
      }
      function setDevice(device) {
        document.title = `SEHUB — ${device.name} (${device.width}px)`;
        document.getElementById("deviceName").textContent = device.name;
        document.getElementById("deviceSize").textContent = `${device.width} × ${device.height}`;
        deviceShell.style.setProperty("--device-width", `${device.width}px`);
        deviceShell.style.setProperty("--device-height", `${device.height}px`);
        frame.style.width = `${device.width}px`;
        preview.style.height = `${device.height}px`;
        devicesEl.querySelectorAll(".device-link").forEach((link) => {
          link.classList.toggle("active", link.dataset.device === device.id);
        });
        history.replaceState(null, "", `?device=${device.id}&path=${encodeURIComponent(normalizePath(pathInput.value))}`);
      }
      function reloadPreview() { preview.src = buildUrl(); }
      DEVICES.forEach((device) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "device-link";
        btn.dataset.device = device.id;
        btn.textContent = `${device.name} (${device.width})`;
        btn.addEventListener("click", () => { setDevice(device); reloadPreview(); });
        devicesEl.appendChild(btn);
      });
      document.getElementById("reload").addEventListener("click", reloadPreview);
      presetSelect.addEventListener("change", () => { pathInput.value = presetSelect.value; reloadPreview(); });
      pathInput.addEventListener("keydown", (e) => { if (e.key === "Enter") reloadPreview(); });
      setDevice(getDevice(params.get("device") || "tablet"));
      reloadPreview();
    </script>
  </body>
</html>
